<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무강대학교 수강신청</title>
  <link rel="stylesheet" href="/css/style.css?v=6" />
  <link rel="stylesheet" href="/css/dashboard.css?v=6" />
  <link rel="stylesheet" href="/css/chatbot.css?v=6" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inria+Serif&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ─── fe2 디자인 스타일 적용 ─── */
    .sidebar-profile {
      background: var(--navy);
      padding: 20px 20px 18px;
    }
    .profile-top {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    .profile-name { font-size: 18px; font-weight: 600; color: var(--white); letter-spacing: -0.3px; }
    .profile-id { font-size: 14px; color: rgba(255,255,255,0.75); }
    
    /* 기존 p 태그가 아닌 fe2의 텍스트 구조 유지 */
    .profile-dept {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
    }
    
    .sidebar-nav .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 500;
      color: var(--navy);
      transition: background 0.15s ease;
    }
    .sidebar-nav .nav-item:hover { background: #eef2fb; }
    .sidebar-nav .nav-item.active {
      background: var(--blue-accent);
      font-weight: 600;
      border-left: 3px solid var(--navy);
    }
    .sidebar-nav .nav-item.logout { color: #c0392b; margin-top: 4px; }
    .sidebar-nav .nav-item.logout:hover { background: #fff0f0; border-left: none; }

    /* Native select element styled to match fe2 .filter-select */
    .filter-bar select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path fill="%23152747" d="M0 0l5 6 5-6z"/></svg>') no-repeat right 14px center;
      background-size: 10px 6px;
      border: none;
      border-radius: 4px;
      padding: 0 34px 0 14px;
      height: 40px;
      min-width: 180px;
      font-size: 14px;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      transition: background 0.15s;
    }
    .filter-bar select:hover { background: #c8c8c8; }
    .filter-bar select:focus { outline: none; }

    /* 담기 버튼 (fe2 btn-register 스타일 완벽 동기화) */
    .btn-apply {
      display: block;
      margin: 0 auto;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      min-width: 80px;
    }
    .btn-apply:hover {
      background: var(--navy-light);
      transform: translateY(-1px);
    }
    .btn-apply:active { transform: translateY(0); }
    .btn-apply:disabled { background: #bbb; cursor: not-allowed; transform: none; }
    
    .btn-apply.registered {
      background: #c0392b;
    }
    .btn-apply.registered:hover {
      background: #a93226;
    }

    #stats-area {
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--white);
      border-radius: 6px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(21,39,71,0.05);
      font-size: 14px;
      color: var(--text-dark);
    }

    /* ─── 시간표 / 모달 등 ─── */
    .panel { display: none; }
    .panel.active { display: block; }
    .content-area { width: 100%; }

    .timetable-wrapper { background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .schedule-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .schedule-table th, .schedule-table td { border: 1px solid var(--border); padding: 8px 5px; text-align: center; word-break: break-all; vertical-align: middle; }
    .schedule-table th { background-color: var(--blue-bg); font-weight: 600; color: var(--navy); font-size: 13px; }
    .schedule-table th:first-child { width: 80px; }
    .time-cell { background-color: var(--blue-bg); width: 80px; color: #555; font-size: 13px; line-height: 1.3; }
    .schedule-table td { height: 60px; font-size: 13px; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 30px; border-radius: 12px; width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .btn-approve { background-color: var(--navy); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; transition: background-color 0.2s; }
    .btn-approve:hover { background-color: var(--navy-light); }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo-area">
      <img src="/image/logo.png" alt="무강대학교 로고" class="logo-img" />
    </div>
  </header>

  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-profile student-info">
        <div class="profile-top">
          <span class="profile-name name">-</span>
          <span class="profile-id id">-</span>
        </div>
        <div class="profile-divider"></div>
        <div class="profile-dept department-info">
          <p>-</p>
          <span class="sub-dept">-</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <!-- 네비게이션 버튼 (fe2 'a' 태그 스타일링 적용) -->
        <button class="nav-item active" id="tab-sugang" onclick="switchTab('sugang')">수강 신청</button>
        <button class="nav-item" id="tab-timetable" onclick="switchTab('timetable')">시간표</button>
        <button class="nav-item logout" onclick="location.href='../auth/login.html'">로그아웃</button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <div class="content-area">

        <!-- 수강신청 탭 패널 -->
        <div id="panel-sugang" class="panel active">

          <!-- 수강신청 기간 안내 배너 -->
          <div id="enrollment-period-banner" style="display:none; background:#fff3e0; border:1px solid #ffe0b2; padding:15px; border-radius:8px; margin-bottom:20px;">
            <span style="font-weight:bold; color:#e65100;">🚨 수강신청 안내:</span>
            <span id="enrollment-period-text" style="margin-left:10px;"></span>
          </div>

          <!-- 필터 바 (fe2의 filter-bar 디자인에 맞춰 네이티브 select 스타일링) -->
          <div class="filter-bar">
            <select id="filter-college" onchange="onCollegeChange()">
              <option value="">전체 단과대학</option>
            </select>
            <select id="filter-department" onchange="applyFilter()">
              <option value="">전체 학과</option>
            </select>
            <select id="filter-type" onchange="applyFilter()">
              <option value="">전체 과목 구분</option>
              <option value="전공필수">전공필수</option>
              <option value="전공선택">전공선택</option>
              <option value="교양필수">교양필수</option>
              <option value="교양선택">교양선택</option>
              <option value="교직">교직</option>
              <option value="공통">공통</option>
            </select>
            <select id="filter-grade" onchange="applyFilter()">
              <option value="">전체 학년</option>
              <option value="1">1학년</option>
              <option value="2">2학년</option>
              <option value="3">3학년</option>
              <option value="4">4학년</option>
            </select>
          </div>
          
          <!-- 이수 내역 요약 (디자인 개선) -->
          <div id="stats-area">
            <strong>나의 이수 내역 요약: </strong>
            총 이수 학점 <span id="stat-total" style="color:#d32f2f; font-weight:bold;">0</span> /
            <span id="stat-req">25</span> 학점
          </div>

          <!-- 장바구니 및 수강신청 내역 -->
          <section class="table-section">
            <div class="section-header">
              <h2 class="section-title">장바구니 내역</h2>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>단과대학</th>
                    <th>개설학과</th>
                    <th>과목명</th>
                    <th>신청상태</th>
                    <th>강의실</th>
                    <th class="center">학점</th>
                    <th class="center">담당교수</th>
                    <th class="center">수강신청</th>
                  </tr>
                </thead>
                <tbody id="cart-tbody">
                  <!-- JS에서 동적으로 채워짐 -->
                </tbody>
              </table>
              <div class="scroll-bar"><div class="scroll-thumb"></div></div>
            </div>
          </section>

          <!-- 수강신청 전체 강의 목록 -->
          <section class="table-section">
            <div class="section-header section-header-reg">
              <h2 class="section-title">수강신청</h2>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>단과대학</th>
                    <th>개설학과</th>
                    <th>과목명</th>
                    <th>과목구분</th>
                    <th>담당교수</th>
                    <th>강의실</th>
                    <th class="center">학점</th>
                    <th class="center">정원</th>
                    <th class="center">수강신청</th>
                  </tr>
                </thead>
                <tbody id="sugang-tbody">
                  <!-- JS에서 동적으로 채워짐 -->
                </tbody>
              </table>
              <div class="scroll-bar"><div class="scroll-thumb"></div></div>
            </div>
          </section>
        </div>

        <!-- 시간표 탭 패널 -->
        <div id="panel-timetable" class="panel">
          <div class="timetable-wrapper">
            <table class="schedule-table">
              <thead>
                <tr>
                  <th></th>
                  <th>월</th>
                  <th>화</th>
                  <th>수</th>
                  <th>목</th>
                  <th>금</th>
                  <th>토</th>
                </tr>
              </thead>
              <tbody id="timetable-tbody">
                <tr>
                  <td class="time-cell">09:00<br>-<br>09:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">10:00<br>-<br>10:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">11:00<br>-<br>11:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">12:00<br>-<br>12:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">13:00<br>-<br>13:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">14:00<br>-<br>14:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">15:00<br>-<br>15:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">16:00<br>-<br>16:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
                <tr>
                  <td class="time-cell">17:00<br>-<br>17:50</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div><!-- /.content-area -->
    </main>
  </div><!-- /.main-layout -->

  <!-- 커스텀 공통 모달 -->
  <div class="modal-overlay" id="customModal">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-bottom:15px; font-size:1.5rem;">알림</h2>
      <p id="modalMessage" style="font-size:1rem; color:#444; margin-bottom:25px; line-height:1.5;"></p>
      <button onclick="closeCustomModal()" class="btn-approve"
        style="background:var(--navy); width:100%; padding:10px; font-size:1.1rem;">확인</button>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="../../js/app.js?v=8"></script>
  <script>
    function showCustomModal(title, message, isError = false) {
      const modal = document.getElementById('customModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalMessage = document.getElementById('modalMessage');
      modalTitle.innerText = title;
      modalMessage.innerHTML = message.replace(/\n/g, '<br>');
      modalTitle.style.color = isError ? '#c62828' : 'var(--navy)';
      modal.style.display = 'flex';
    }
    function closeCustomModal() {
      document.getElementById('customModal').style.display = 'none';
    }
    
    // app.js 호환을 위해 프로필 학과 정보 UI 업데이트 헬퍼 추가
    const originalObserver = new MutationObserver(() => {
      const deptP = document.querySelector('.department-info p');
      if (deptP && deptP.innerText !== '-') {
        const displaySpan = document.querySelector('.dept-display');
        if (displaySpan) displaySpan.innerText = deptP.innerText;
      }
    });
    // DOM이 이미 렌더링 된 경우를 대비한 꼼수 대신, app.js가 innerText로 넣는 곳을 수정:
    // 실제 app.js는 document.querySelector('.department-info p').innerText = ... 형식으로 넣을 가능성이 큼.
    // 기존 p 태그 대신 span을 둬서 깨짐 방지
  </script>
</body>
</html>
