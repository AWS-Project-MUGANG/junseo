<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 학사 규정 업데이트 - 무강대학교</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inria+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── from dashboard.css ─────────────────── */
    .table-section {
      background: var(--white); border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 24px; overflow: hidden; box-shadow: 0 1px 4px rgba(21,39,71,0.05);
      animation: fadeInUp 0.3s ease both;
    }
    .section-header { background: var(--blue-bg); padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .section-title  { font-size: 15px; font-weight: 700; color: var(--navy); letter-spacing: -0.2px; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy); color: var(--white); padding: 12px 24px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(21,39,71,0.25); opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none; z-index: 9999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 900px) { .sidebar { width: 180px; } .content { margin-left: 180px; padding: 16px; } }
    @media (max-width: 640px) { .sidebar { display: none; } .content { margin-left: 0; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .nav-item { animation: fadeIn 0.3s ease both; }
    .nav-item:nth-child(1) { animation-delay: 0.05s; }
    .nav-item:nth-child(2) { animation-delay: 0.10s; }
    .nav-item:nth-child(3) { animation-delay: 0.15s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

    /* ─── 페이지 전용 스타일 ─────────────────── */
    .rag-card {
      background: white;
      padding: 28px;
      border-radius: 0 0 8px 8px;
    }

    .rag-desc {
      margin-bottom: 24px;
      padding: 14px 18px;
      background: #e8f0fe;
      border-left: 4px solid #152747;
      border-radius: 0 6px 6px 0;
      color: #152747;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .rag-field {
      margin-bottom: 20px;
    }

    .rag-field label {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      color: #152747;
      margin-bottom: 8px;
    }

    .rag-field input[type="text"],
    .rag-field input[type="file"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif;
      box-sizing: border-box;
      background: #fff;
      transition: border-color .2s;
    }

    .rag-field input[type="text"]:focus {
      outline: none;
      border-color: #152747;
    }

    .rag-submit-btn {
      width: 100%;
      padding: 14px;
      background: #152747;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background .2s;
      margin-top: 4px;
    }

    .rag-submit-btn:hover    { background: #1e3460; }
    .rag-submit-btn:disabled { background: #9aa5b8; cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo-area">
      <img src="/image/logo.png" alt="무강대학교 로고" class="logo-img" />
    </div>
  </header>

  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="profile-top">
          <span class="profile-name" id="staff-name">정보전산관리부</span>
        </div>
        <div class="profile-divider"></div>
        <div class="profile-dept" id="staff-dept">임정현<br />아동가족복지학과 담당</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/pages/admin/enrollment_schedule.html" class="nav-item">수강신청 스케줄</a>
        <a href="/pages/admin/course_management.html" class="nav-item">개설 관리</a>
        <a href="/pages/admin/rag_update.html" class="nav-item active">AI 학사 규정</a>
        <a href="/pages/admin/server_management.html" class="nav-item">서버 관리</a>
        <a href="/index.html" class="nav-item logout" onclick="logout(); return false;">로그아웃</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="content">

      <section class="table-section">
        <div class="section-header">
          <h2 class="section-title">지식베이스(RAG) 훈련 센터</h2>
        </div>

        <div class="rag-card">
          <div class="rag-desc">
            💡 <strong>AI 챗봇 무강이 훈련하기:</strong>
            여기에 입력된 새로운 학교 규정, 공지사항 데이터는 AWS Bedrock(LLM) 환경의 벡터 스토어로 전송되어,
            즉시 챗봇 상담 지식으로 활용됩니다.
          </div>

          <div class="rag-field">
            <label>추가할 규정/공지 제목</label>
            <input type="text" id="rag-title"
              placeholder="예: 2026학년도 통학버스 및 기숙사 셔틀 운행 개편 안내" />
          </div>

          <div class="rag-field">
            <label>학습할 문서 파일 (PDF / TXT / CSV)</label>
            <input type="file" id="rag-file" accept=".pdf,.txt,.csv" />
          </div>

          <button class="rag-submit-btn btn-approve" onclick="submitRag()">
            🤖 데이터 임베딩 &amp; 지식베이스 업데이트 전송
          </button>
        </div>
      </section>

    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // 사이드바 프로필 로드
    (async () => {
      const userId = localStorage.getItem('user_no');
      const token = localStorage.getItem('access_token');
      if (!userId) return;
      try {
        const res = await fetch(`/api/v1/users/${userId}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        if (res.ok) {
          const p = await res.json();
          const nameEl = document.getElementById('staff-name');
          const deptEl = document.getElementById('staff-dept');
          if (nameEl) nameEl.textContent = p.name || '정보전산관리부';
          if (deptEl) {
            const college = (p.college || '').trim();
            const depart = (p.depart || '').trim();
            if (college || depart) {
              deptEl.innerHTML = `${college}<br />${depart || '교직원'} 담당`;
            } else {
              deptEl.innerHTML = `${p.student_id || '-'}<br />교직원 계정`;
            }
          }
        }
      } catch (e) { console.error('프로필 로드 오류:', e); }
    })();

    async function submitRag() {
      const title     = document.getElementById('rag-title').value;
      const fileInput = document.getElementById('rag-file');

      if (!title || fileInput.files.length === 0) {
        alert('⚠️ 제목과 파일을 모두 선택해주세요!');
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      formData.append('file', fileInput.files[0]);

      const btn = document.querySelector('.btn-approve');
      const originalText = btn.innerText;
      btn.innerText = '문서 분석 및 임베딩 중...';
      btn.disabled  = true;

      try {
        const res = await fetch('/api/v1/admin/rag/upload', {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          const data = await res.json();
          alert('✅ 성공 메세지: \n' + data.message);
          document.getElementById('rag-title').value = '';
          fileInput.value = '';
        } else {
          const err = await res.json();
          alert('오류 발생: ' + (err.detail || '업로드 실패'));
        }
      } catch (e) {
        console.error(e);
        alert('통신 에러가 발생했습니다.');
      } finally {
        btn.innerText = originalText;
        btn.disabled  = false;
      }
    }

    function logout() {
      localStorage.clear();
      location.href = '/index.html';
    }
  </script>
</body>
</html>
