name: Blue-Green Deploy to ECR & EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_FRONTEND_REPOSITORY: mugang-frontend
  ECR_BACKEND_REPOSITORY: mugang-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Image Tag
        id: set-tag
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG

      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG

  blue-green-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=mugang/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Get Current Active Color
        id: colors
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: |
          ACTIVE=$(terraform output -raw active_color 2>/dev/null || echo "blue")
          INACTIVE=$([ "$ACTIVE" = "blue" ] && echo "green" || echo "blue")
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE" >> $GITHUB_OUTPUT
          echo "Current active: $ACTIVE / Target: $INACTIVE"

      - name: Deploy New Image to Inactive
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_active_color: ${{ steps.colors.outputs.active }}
          TF_VAR_blue_desired: "1"
          TF_VAR_green_desired: "1"
          TF_VAR_blue_image_tag: ${{ steps.colors.outputs.inactive == 'blue' && needs.build-and-push.outputs.image_tag || 'latest' }}
          TF_VAR_green_image_tag: ${{ steps.colors.outputs.inactive == 'green' && needs.build-and-push.outputs.image_tag || 'latest' }}
        run: terraform apply -auto-approve

      - name: Wait for Inactive ASG InService
        env:
          INACTIVE: ${{ steps.colors.outputs.inactive }}
        run: |
          echo "Waiting for mugang-${INACTIVE}-asg InService..."
          for i in $(seq 1 30); do
            STATE=$(aws autoscaling describe-auto-scaling-instances \
              --query "AutoScalingInstances[?AutoScalingGroupName=='mugang-${INACTIVE}-asg'].LifecycleState" \
              --output text 2>/dev/null | head -1)
            echo "  [${i}/30] state: ${STATE:-none}"
            if [ "$STATE" = "InService" ]; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ASG not InService in time"
              exit 1
            fi
            sleep 10
          done

      - name: Health Check via SSM
        id: healthcheck
        env:
          INACTIVE: ${{ steps.colors.outputs.inactive }}
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-instances \
            --query "AutoScalingInstances[?AutoScalingGroupName=='mugang-${INACTIVE}-asg'&&LifecycleState=='InService'].InstanceId" \
            --output text | head -1)
          INACTIVE_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text)
          echo "inactive_ip=$INACTIVE_IP" >> $GITHUB_OUTPUT
          echo "Inactive EC2 IP: $INACTIVE_IP"

          echo "Waiting inactive SSM Online..."
          for i in $(seq 1 30); do
            PING=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "  [${i}/30] Inactive SSM: $PING"
            if [ "$PING" = "Online" ]; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Inactive SSM not online: $PING"
              exit 1
            fi
            sleep 10
          done

          PROXY_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mugang-proxy" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          echo "proxy_id=$PROXY_ID" >> $GITHUB_OUTPUT

          echo "Waiting proxy SSM Online..."
          for i in $(seq 1 18); do
            PROXY_PING=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${PROXY_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "  [${i}/18] Proxy SSM: $PROXY_PING"
            if [ "$PROXY_PING" = "Online" ]; then
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Proxy SSM not online: $PROXY_PING"
              exit 1
            fi
            sleep 10
          done

          echo "Health check up to 4 minutes..."
          for i in $(seq 1 20); do
            CMD_ID=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --instance-ids "$INSTANCE_ID" \
              --parameters commands='["curl -fsS http://127.0.0.1:8000/docs >/dev/null"]' \
              --query 'Command.CommandId' --output text 2>/dev/null || echo "")

            if [ -z "$CMD_ID" ]; then
              echo "  [${i}/20] health: NoCommandId"
              sleep 8
              continue
            fi

            ATTEMPT_STATUS="Pending"
            for j in $(seq 1 8); do
              ATTEMPT_STATUS=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'Status' --output text 2>/dev/null || echo "Pending")

              if [ "$ATTEMPT_STATUS" = "Success" ]; then
                echo "  [${i}/20] health: Success"
                exit 0
              fi

              if [ "$ATTEMPT_STATUS" = "Failed" ] || [ "$ATTEMPT_STATUS" = "Cancelled" ] || [ "$ATTEMPT_STATUS" = "TimedOut" ]; then
                break
              fi

              sleep 3
            done

            echo "  [${i}/20] health: $ATTEMPT_STATUS"
            sleep 5
          done

          echo "Health check failed"
          exit 1

      - name: Switch Proxy Nginx
        env:
          INACTIVE: ${{ steps.colors.outputs.inactive }}
          INACTIVE_IP: ${{ steps.healthcheck.outputs.inactive_ip }}
          PROXY_ID: ${{ steps.healthcheck.outputs.proxy_id }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$PROXY_ID" \
            --parameters "{\"commands\":[\"/usr/local/bin/update-proxy.sh $INACTIVE $INACTIVE_IP\"]}" \
            --query 'Command.CommandId' --output text)
          echo "Switch Command ID: $CMD_ID"

          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$PROXY_ID" \
              --query 'StatusDetails' --output text 2>/dev/null || echo "Pending")
            echo "  [${i}/20] switch status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Proxy switch failed"
              exit 1
            fi
            sleep 3
          done

      - name: Finalize
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_active_color: ${{ steps.colors.outputs.inactive }}
          TF_VAR_blue_desired: ${{ steps.colors.outputs.inactive == 'blue' && '1' || '0' }}
          TF_VAR_green_desired: ${{ steps.colors.outputs.inactive == 'green' && '1' || '0' }}
          TF_VAR_blue_image_tag: ${{ steps.colors.outputs.inactive == 'blue' && needs.build-and-push.outputs.image_tag || 'latest' }}
          TF_VAR_green_image_tag: ${{ steps.colors.outputs.inactive == 'green' && needs.build-and-push.outputs.image_tag || 'latest' }}
        run: terraform apply -auto-approve
