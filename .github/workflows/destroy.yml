name: Destroy All AWS Resources

on:
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행
    inputs:
      confirm:
        description: '모든 리소스를 삭제합니다. "destroy"를 입력하세요.'
        required: true

env:
  AWS_REGION: ap-northeast-2

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    steps:
    - name: 확인 값 검증
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
          echo "확인 값이 올바르지 않습니다. 'destroy'를 입력해야 합니다."
          exit 1
        fi

    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "~1.7"

    - name: Terraform Init
      working-directory: terraform
      run: |
        terraform init \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=mugang/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}"

    - name: Terraform Destroy
      working-directory: terraform
      env:
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
      run: |
        terraform destroy -auto-approve
        echo "메인 AWS 리소스 삭제 완료 (ECR 포함)"

    - name: S3 상태 버킷 삭제
      run: |
        echo "S3 버킷 내용물 삭제 중..."
        aws s3 rm s3://${{ secrets.TF_STATE_BUCKET }} --recursive
        aws s3 rb s3://${{ secrets.TF_STATE_BUCKET }}
        echo "S3 상태 버킷 삭제 완료"
